<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Seunghun Shin | Dental CAD/CAM Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    header {
      padding: 48px 20px 36px;
      background: white;
      text-align: center;
      border-bottom: 1px solid #dddddd;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 38px;
    }

    .job-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
    }

    .location {
      margin: 0;
      color: #666666;
    }

    .buttons {
      margin-top: 24px;
    }

    .button {
      display: inline-block;
      margin: 6px;
      padding: 12px 20px;
      border-radius: 6px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .button:hover {
      opacity: 0.8;
    }

    main {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 18px;
    }

    .pdf-section {
      background: white;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .pdf-frame {
      width: 100%;
      height: 85vh;
      border: none;
    }

    .mobile-message {
      display: none;
      padding: 20px;
      text-align: center;
    }

    footer {
      padding: 36px 20px;
      text-align: center;
      color: #666666;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 30px;
      }

      .pdf-frame {
        height: 72vh;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>SeungHun Shin</h1>

    <p class="job-title">
      Dental Technician | CAD Designer
    </p>

    <p class="location">
      Winnipeg, Manitoba
    </p>

    <div class="buttons">
      <a
        class="button"
        href="portfolio.pdf"
        target="_blank"
      >
        Open Portfolio
      </a>

      <a
        class="button"
        href="portfolio.pdf"
        download
      >
        Download PDF
      </a>

      <a
        class="button"
        href="mailto:seunghun.ca@gmail.com"
      >
        Email
      </a>
    </div>
  </header>

  <main>
    <section class="pdf-section">
      <iframe
        class="pdf-frame"
        src="portfolio.pdf"
        title="Seunghun Shin Dental Portfolio"
      >
      </iframe>

      <div class="mobile-message">
        <p>
          Your browser may not support embedded PDF viewing.
        </p>

        <a
          class="button"
          href="portfolio.pdf"
          target="_blank"
        >
          Open Portfolio PDF
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>
      © 2026 Seunghun Shin
    </p>
  </footer>

</body>
</html>
