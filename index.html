<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Dental CAD/CAM portfolio of Seunghun Shin in Winnipeg, Manitoba."
  >

  <title>Seunghun Shin | Dental CAD/CAM Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.5;
    }

    header {
      padding: 48px 20px 36px;
      background: white;
      text-align: center;
      border-bottom: 1px solid #dddddd;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 38px;
    }

    .job-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
    }

    .location {
      margin: 0;
      color: #666666;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 6px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .button:hover {
      opacity: 0.8;
    }

    main {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 18px;
    }

    .portfolio-heading {
      margin-bottom: 22px;
      text-align: center;
    }

    .portfolio-heading h2 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .portfolio-heading p {
      margin: 0;
      color: #666666;
    }

    .pdf-pages {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .pdf-page {
      overflow: hidden;
      width: 100%;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .pdf-page canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .loading-message,
    .error-message {
      padding: 40px 20px;
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .error-message {
      color: #9b1c1c;
    }

    footer {
      padding: 36px 20px;
      text-align: center;
      color: #666666;
    }

    @media (max-width: 700px) {
      header {
        padding: 36px 16px 28px;
      }

      h1 {
        font-size: 30px;
      }

      .job-title {
        font-size: 18px;
      }

      main {
        margin: 20px auto;
        padding: 0 10px;
      }

      .portfolio-heading h2 {
        font-size: 26px;
      }

      .pdf-pages {
        gap: 12px;
      }

      .pdf-page {
        border-radius: 5px;
      }

      .buttons {
        gap: 8px;
      }

      .button {
        padding: 11px 16px;
      }
    }

    @media (max-width: 480px) {
      .buttons {
        flex-direction: column;
        align-items: stretch;
      }

      .button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Seunghun Shin</h1>

    <p class="job-title">
      Dental Technician | CAD Designer
    </p>

    <p class="location">
      Winnipeg, Manitoba
    </p>

    <div class="buttons">

      <a
        class="button"
        href="portfolio.pdf"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open Portfolio
      </a>

      <a
        class="button"
        href="portfolio.pdf"
        download
      >
        Download PDF
      </a>

      <a
        class="button"
        href="https://www.instagram.com/dt_shin_/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Instagram
      </a>
      
      <a
        class="button"
        href="mailto:seunghun.ca@gmail.com"
      >
        Send Email
      </a>

      <a class="button" href="sms:+17789951298">
        Send Text Message
      </a>
      
    </div>
  </header>

  <main>

    <section class="portfolio-heading">
      <h2>Portfolio</h2>

    </section>

    <div
      id="loading-message"
      class="loading-message"
    >
      Loading portfolio...
    </div>

    <div
      id="pdf-pages"
      class="pdf-pages"
    ></div>

    <div
      id="error-message"
      class="error-message"
      hidden
    >
      <p>
        The portfolio could not be loaded.
      </p>

      <a
        class="button"
        href="portfolio.pdf"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open Portfolio PDF
      </a>
    </div>

  </main>

  <footer>
    <p>
      © 2026 Seunghun Shin
    </p>
  </footer>

  <script type="module">
    import * as pdfjsLib from
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.worker.mjs";

    const pdfUrl = "portfolio.pdf";

    const container =
      document.getElementById("pdf-pages");

    const loadingMessage =
      document.getElementById("loading-message");

    const errorMessage =
      document.getElementById("error-message");

    async function renderPortfolio() {
      try {
        const loadingTask =
          pdfjsLib.getDocument(pdfUrl);

        const pdf =
          await loadingTask.promise;

        loadingMessage.hidden = true;

        for (
          let pageNumber = 1;
          pageNumber <= pdf.numPages;
          pageNumber++
        ) {
          const page =
            await pdf.getPage(pageNumber);

          const baseViewport =
            page.getViewport({ scale: 1 });

          const availableWidth =
            container.clientWidth;

          const displayScale =
            availableWidth / baseViewport.width;

          const pixelRatio =
            Math.min(
              window.devicePixelRatio || 1,
              2
            );

          const renderViewport =
            page.getViewport({
              scale: displayScale * pixelRatio
            });

          const pageWrapper =
            document.createElement("div");

          pageWrapper.className =
            "pdf-page";

          const canvas =
            document.createElement("canvas");

          const context =
            canvas.getContext(
              "2d",
              { alpha: false }
            );

          canvas.width =
            Math.floor(renderViewport.width);

          canvas.height =
            Math.floor(renderViewport.height);

          canvas.style.width =
            `${Math.floor(
              renderViewport.width / pixelRatio
            )}px`;

          canvas.style.height =
            `${Math.floor(
              renderViewport.height / pixelRatio
            )}px`;

          pageWrapper.appendChild(canvas);
          container.appendChild(pageWrapper);

          await page.render({
            canvasContext: context,
            viewport: renderViewport
          }).promise;
        }
      } catch (error) {
        console.error(
          "PDF rendering error:",
          error
        );

        loadingMessage.hidden = true;
        errorMessage.hidden = false;
      }
    }

    renderPortfolio();
  </script>

</body>
</html>
